<!DOCTYPE html>
<html>
<head>
    <title>Quiz App</title>
    <style>
        body {
            font-family: Arial;
            background: #eaf2f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .quiz-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
        }

        h3 {
            margin-bottom: 15px;
        }

        .option {
            display: block;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            cursor: pointer;
        }

        .option:hover {
            background: #d6eaf8;
        }

        button {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            border: none;
            background: #28a745;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #1e7e34;
        }
    </style>
</head>
<body>

<div class="quiz-box">
    <h3>What is HTML?</h3>

    <label class="option">
        <input type="radio" name="q1"> Programming Language
    </label>

    <label class="option">
        <input type="radio" name="q1"> Markup Language
    </label>

    <label class="option">
        <input type="radio" name="q1"> Database
    </label>

    <label class="option">
        <input type="radio" name="q1"> Operating System
    </label>

    <button>Next</button>
</div>

</body>
</html>
